[bot]
; Путь к scenario.json, который будет выполнять бот
scenario_path = C:\bots\scenarios\main_loop\scenario.json

; Зацикливать выполнение (1 — после завершения запускать снова, 0 — один прогон)
loop = 1

; Пауза между прогонами в режиме loop, секунды
loop_delay = 5

; Имя бота для отображения
bot_name = Бот №1
